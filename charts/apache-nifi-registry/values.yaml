nodeSelector: {}

tolerations: []

affinity: {}

app:
  nifiRegistryWebHttpsHost: "0.0.0.0"
  nifiRegistryWebHttpsPort: 18443
  # HTTP deployment is not working
  nifiRegistryWebHttpHost: "0.0.0.0"
  nifiRegistryWebHttpPort: 18080
  nifiRegistryAuthorizerConfigurationFile: ./custom_conf/authorizers.xml
  nifiRegistryLoginIdentityProviderConfigurationFile: ./custom_conf/identity-providers.xml
  nifiRegistryWProvidersConfigurationFile: ./custom_conf/providers.xml
  nifiRegistryRegistryAliasConfigurationFile: ./custom_conf/registry-aliases.xml
