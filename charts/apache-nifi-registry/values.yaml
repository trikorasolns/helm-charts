# Additional volumeMounts on the output Deployment definition.
volumeMounts:
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true
# - name: apache-nifi-registry-certs
#   mountPath: /opt/certs
#   readOnly: false
- name: apache-nifi-registry-custom-conf
  mountPath: /opt/nifi-registry/nifi-registry-current/custom_conf
  readOnly: false
- name: apache-nifi-registry-drivers
  mountPath: /opt/nifi-registry/nifi-registry-current/drivers
  readOnly: false
- name: apache-nifi-registry-flow-storage
  mountPath: /opt/nifi-registry/nifi-registry-current/flow_storage
  readOnly: false
# - name: apache-nifi-registry-database-repo
#   mountPath: /opt/nifi-registry/nifi-registry-current/database_repository
#   readOnly: falseend
# - name: apache-nifi-registry-content-repo
